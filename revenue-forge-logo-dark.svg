<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <!-- Fire gradient for the anvil/forge glow -->
    <linearGradient id="fireGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#ff6b00;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ff8c00;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.7"/>
    </linearGradient>

    <!-- Radial glow behind the icon -->
    <radialGradient id="heatGlow" cx="50%" cy="60%" r="50%" fx="50%" fy="60%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.4"/>
      <stop offset="50%" style="stop-color:#ff4500;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0"/>
    </radialGradient>

    <!-- Ember particle gradient -->
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:0"/>
    </radialGradient>

    <!-- Text glow filter -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ff6b00" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Heavy glow for the forge icon -->
    <filter id="forgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ff6b00" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner glow for the anvil -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ff4500" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in"/>
    </filter>
  </defs>

  <!-- Background: transparent -->

  <!-- Heat glow behind forge icon -->
  <ellipse cx="85" cy="110" rx="60" ry="50" fill="url(#heatGlow)"/>

  <!-- FORGE ICON: Anvil with flames -->
  <g transform="translate(45, 50)" filter="url(#forgeGlow)">
    <!-- Anvil base -->
    <path d="M20 90 L60 90 L65 80 L55 75 L55 60 L70 55 L70 50 L10 50 L10 55 L25 60 L25 75 L15 80 Z"
          fill="#c0c0c0" opacity="0.9"/>
    <!-- Anvil horn -->
    <path d="M10 50 L-5 48 L-5 52 L10 55 Z" fill="#a0a0a0" opacity="0.9"/>
    <!-- Anvil face highlight -->
    <path d="M15 50 L65 50 L62 52 L18 52 Z" fill="#e0e0e0" opacity="0.6"/>

    <!-- Flame 1 (center, tallest) -->
    <path d="M40 48 C38 30, 30 25, 35 8 C38 18, 42 15, 40 5 C45 15, 50 20, 48 35 C52 25, 48 20, 50 15 C55 25, 48 38, 45 48 Z"
          fill="url(#fireGlow)" opacity="0.95"/>

    <!-- Flame 2 (left) -->
    <path d="M25 50 C23 38, 18 35, 22 22 C24 30, 27 28, 26 18 C30 28, 32 32, 30 42 C33 35, 30 30, 32 25 C36 33, 32 42, 28 50 Z"
          fill="url(#fireGlow)" opacity="0.85"/>

    <!-- Flame 3 (right) -->
    <path d="M55 50 C53 40, 50 37, 53 26 C55 33, 57 30, 56 22 C60 30, 62 34, 58 44 C61 38, 58 33, 60 28 C64 36, 60 44, 57 50 Z"
          fill="url(#fireGlow)" opacity="0.85"/>

    <!-- Inner white-hot core -->
    <path d="M38 48 C37 40, 34 37, 37 28 C39 34, 41 32, 40 26 C43 32, 44 36, 42 44 Z"
          fill="#fff4e0" opacity="0.7"/>

    <!-- Hammer (crossed over anvil) -->
    <g transform="rotate(-30, 55, 30)">
      <rect x="52" y="5" width="6" height="35" rx="2" fill="#8a8a8a" opacity="0.85"/>
      <rect x="46" y="2" width="18" height="10" rx="3" fill="#a0a0a0" opacity="0.9"/>
    </g>
  </g>

  <!-- Ember particles -->
  <circle cx="65" cy="55" r="2" fill="url(#ember)" opacity="0.8"/>
  <circle cx="95" cy="45" r="1.5" fill="url(#ember)" opacity="0.6"/>
  <circle cx="50" cy="40" r="1" fill="url(#ember)" opacity="0.7"/>
  <circle cx="110" cy="50" r="1.5" fill="url(#ember)" opacity="0.5"/>
  <circle cx="78" cy="38" r="1" fill="url(#ember)" opacity="0.9"/>
  <circle cx="58" cy="30" r="1.5" fill="url(#ember)" opacity="0.4"/>

  <!-- REVENUE FORGE text -->
  <text x="160" y="105" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1" fill="#f5f5f5" filter="url(#textGlow)">
    REVENUE
  </text>
  <text x="160" y="145" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1" fill="url(#fireGlow)" filter="url(#textGlow)">
    FORGE
  </text>

  <!-- Subtle tagline -->
  <text x="163" y="165" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="4" fill="#666666" text-transform="uppercase">
    DIGITAL MARKETING INFRASTRUCTURE
  </text>

  <!-- Subtle bottom heat line -->
  <line x1="160" y1="175" x2="560" y2="175" stroke="#ff4500" stroke-width="1" opacity="0.15"/>
</svg>